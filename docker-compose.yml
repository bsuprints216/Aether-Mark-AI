version: '3.9'

services:
  # AetherMark AI Core Orchestration Layer
  api:
    build: .
    container_name: aethermark_api
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    networks:
      - aether_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AetherMark AI Intelligence Dashboard
  dashboard:
    build: .
    container_name: aethermark_dashboard
    restart: always
    ports:
      - "3000:3000"
    command: ["python", "run_dashboard.py"]
    networks:
      - aether_net

  # Redis for Agent State Persistence & Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: aethermark_state_db
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aether_net

networks:
  aether_net:
    driver: bridge

volumes:
  redis_data:
